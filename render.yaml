databases:
  - name: demandorchestrator-db
    databaseName: demandorchestrator
    user: demandorchestrator
    plan: starter

services:
  - type: web
    name: demandorchestrator-api
    env: docker
    plan: starter
    rootDir: apps/api
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: demandorchestrator-db
          property: connectionString
      - key: PUBLISH_PROVIDER_MODE
        value: mock-social

  - type: web
    name: demandorchestrator-web
    env: node
    plan: starter
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://api.demandorchestrator.ai
